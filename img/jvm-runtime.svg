<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1330 340" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Source -->
  <rect x="20" y="128" width="160" height="84" rx="10" fill="#FAFAFA" stroke="#444" stroke-width="2"/>
  <text x="100" y="163" text-anchor="middle" font-size="22" font-weight="600" fill="#1A1A1A">Source</text>
  <text x="100" y="192" text-anchor="middle" font-size="20" fill="#555">.java</text>

  <line x1="182" y1="170" x2="248" y2="170" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="155" text-anchor="middle" font-size="18" fill="#555">javac</text>

  <!-- Bytecode -->
  <rect x="250" y="128" width="170" height="84" rx="10" fill="#FAFAFA" stroke="#444" stroke-width="2"/>
  <text x="335" y="163" text-anchor="middle" font-size="22" font-weight="600" fill="#1A1A1A">Bytecode</text>
  <text x="335" y="192" text-anchor="middle" font-size="20" fill="#555">.class</text>

  <line x1="422" y1="170" x2="498" y2="170" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- JVM box -->
  <rect x="500" y="58" width="600" height="232" rx="14" fill="#EAF2F8" stroke="#4E7C9E" stroke-width="2.5"/>
  <text x="524" y="94" font-size="22" font-weight="700" fill="#33617F">JVM runtime</text>

  <rect x="528" y="128" width="180" height="84" rx="10" fill="#FFFFFF" stroke="#4E7C9E" stroke-width="2"/>
  <text x="618" y="163" text-anchor="middle" font-size="21" font-weight="600" fill="#1A1A1A">Interpreter</text>
  <text x="618" y="192" text-anchor="middle" font-size="18" fill="#555">runs bytecode</text>

  <line x1="710" y1="170" x2="816" y2="170" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="763" y="155" text-anchor="middle" font-size="18" fill="#555">hot paths</text>

  <rect x="818" y="128" width="200" height="84" rx="10" fill="#FFFFFF" stroke="#4E7C9E" stroke-width="2"/>
  <text x="918" y="163" text-anchor="middle" font-size="21" font-weight="600" fill="#1A1A1A">JIT compiler</text>
  <text x="918" y="192" text-anchor="middle" font-size="18" fill="#555">&#8594; native code</text>

  <text x="524" y="266" font-size="17" fill="#33617F">class loader &#183; garbage collector + heap &#183; warm-up</text>

  <line x1="1102" y1="170" x2="1178" y2="170" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1140" y="155" text-anchor="middle" font-size="18" fill="#555">native</text>

  <!-- CPU -->
  <rect x="1180" y="128" width="140" height="84" rx="10" fill="#FAFAFA" stroke="#444" stroke-width="2"/>
  <text x="1250" y="178" text-anchor="middle" font-size="22" font-weight="600" fill="#1A1A1A">CPU</text>
</svg>
